

<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Student Performance Predictor</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #dbeafe, #eff6ff);
            margin: 0;
            padding: 0;
        }
        .container{
            width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
        }
        h2{
            text-align: center;
            color: #1d4ed8;
            margin-bottom: 25px;
        }
        label{
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            margin-top: 10px;
        }
        .name-input{
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .row{
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .row input{
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }
        button{
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }
        .add-btn{
            background: #16a34a;
            color: white;
            margin-bottom: 15px;
        }
        .submit-btn{
            width: 100%;
            background: #2563eb;
            color: white;
        }
        .submit-btn:hover{
            background: #1e40af;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Dynamic Student Performance Predictor</h2>

        <form method="POST">
            {% csrf_token %}

            <label>Student Name</label>
            <input type="text" name="student_name" class="name-input" placeholder="Enter Student Name" required>

            <div id="subject-container">
                <div class="row">
                    <input type="text" name="subject_name" placeholder="Enter Subject Name" required>
                    <input type="number" name="subject_marks" placeholder="Enter Marks" required>
                </div>
                <div class="row">
                    <input type="text" name="subject_name" placeholder="Enter Subject Name" required>
                    <input type="number" name="subject_marks" placeholder="Enter Marks" required>
                </div>
                <div class="row">
                    <input type="text" name="subject_name" placeholder="Enter Subject Name" required>
                    <input type="number" name="subject_marks" placeholder="Enter Marks" required>
                </div>
            </div>

            <button type="button" class="add-btn" onclick="addSubject()">Add More Subject</button>
            <button type="submit" class="submit-btn">Check Result</button>
        </form>
    </div>

    <script>
        function addSubject() {
            let container = document.getElementById('subject-container');

            let newRow = document.createElement('div');
            newRow.className = 'row';

            newRow.innerHTML = `
                <input type="text" name="subject_name" placeholder="Enter Subject Name" required>
                <input type="number" name="subject_marks" placeholder="Enter Marks" required>
            `;

            container.appendChild(newRow);
        }
    </script>
</body>
</html>
